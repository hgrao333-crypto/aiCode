<svg width="520" height="178" viewBox="0 0 520 178" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', Courier, monospace">
  <!-- Background -->
  <rect width="520" height="178" rx="10" fill="#fafafa" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- Title -->
  <text x="16" y="22" font-size="11" fill="#6b7280" font-weight="600" font-family="system-ui, sans-serif">d = {'apple': 5, 'cat': 2, 'dog': 8}  —  lookup d['apple']</text>

  <!-- Flow: key → hash → index → value -->
  <rect x="14" y="30" width="82" height="30" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="55" y="50" font-size="12" fill="#5b21b6" text-anchor="middle">'apple'</text>

  <text x="104" y="50" font-size="18" fill="#9ca3af">→</text>

  <rect x="122" y="30" width="100" height="30" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="172" y="50" font-size="11" fill="#854d0e" text-anchor="middle" font-family="system-ui, sans-serif">hash() % 8</text>

  <text x="230" y="50" font-size="18" fill="#9ca3af">→</text>

  <rect x="248" y="30" width="68" height="30" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="282" y="50" font-size="13" fill="#15803d" text-anchor="middle" font-weight="700">index 0</text>

  <text x="324" y="50" font-size="18" fill="#9ca3af">→</text>

  <rect x="342" y="30" width="50" height="30" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="367" y="50" font-size="16" fill="#15803d" text-anchor="middle" font-weight="700">5</text>

  <rect x="402" y="30" width="104" height="30" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="454" y="50" font-size="10" fill="#065f46" text-anchor="middle" font-family="system-ui, sans-serif">✓ O(1) found</text>

  <!-- Bucket array label -->
  <text x="14" y="82" font-size="10" fill="#9ca3af" font-family="system-ui, sans-serif">Backing array (8 buckets):</text>

  <!-- Bucket 0: apple→5 (highlighted purple) -->
  <rect x="14" y="90" width="59" height="44" rx="5" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="43" y="105" font-size="9" fill="#7c3aed" text-anchor="middle" font-family="system-ui, sans-serif">b[0]</text>
  <text x="43" y="125" font-size="8.5" fill="#5b21b6" text-anchor="middle" font-weight="600">apple→5</text>

  <!-- Bucket 1: empty -->
  <rect x="78" y="90" width="59" height="44" rx="5" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="107" y="105" font-size="9" fill="#d1d5db" text-anchor="middle" font-family="system-ui, sans-serif">b[1]</text>
  <text x="107" y="122" font-size="13" fill="#e5e7eb" text-anchor="middle">—</text>

  <!-- Bucket 2: empty -->
  <rect x="142" y="90" width="59" height="44" rx="5" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="171" y="105" font-size="9" fill="#d1d5db" text-anchor="middle" font-family="system-ui, sans-serif">b[2]</text>
  <text x="171" y="122" font-size="13" fill="#e5e7eb" text-anchor="middle">—</text>

  <!-- Bucket 3: empty -->
  <rect x="206" y="90" width="59" height="44" rx="5" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="235" y="105" font-size="9" fill="#d1d5db" text-anchor="middle" font-family="system-ui, sans-serif">b[3]</text>
  <text x="235" y="122" font-size="13" fill="#e5e7eb" text-anchor="middle">—</text>

  <!-- Bucket 4: empty -->
  <rect x="270" y="90" width="59" height="44" rx="5" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="299" y="105" font-size="9" fill="#d1d5db" text-anchor="middle" font-family="system-ui, sans-serif">b[4]</text>
  <text x="299" y="122" font-size="13" fill="#e5e7eb" text-anchor="middle">—</text>

  <!-- Bucket 5: cat→2 -->
  <rect x="334" y="90" width="59" height="44" rx="5" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="363" y="105" font-size="9" fill="#3b82f6" text-anchor="middle" font-family="system-ui, sans-serif">b[5]</text>
  <text x="363" y="125" font-size="8.5" fill="#1d4ed8" text-anchor="middle" font-weight="600">cat→2</text>

  <!-- Bucket 6: empty -->
  <rect x="398" y="90" width="59" height="44" rx="5" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="427" y="105" font-size="9" fill="#d1d5db" text-anchor="middle" font-family="system-ui, sans-serif">b[6]</text>
  <text x="427" y="122" font-size="13" fill="#e5e7eb" text-anchor="middle">—</text>

  <!-- Bucket 7: dog→8 -->
  <rect x="462" y="90" width="44" height="44" rx="5" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="484" y="105" font-size="9" fill="#b45309" text-anchor="middle" font-family="system-ui, sans-serif">b[7]</text>
  <text x="484" y="125" font-size="8.5" fill="#92400e" text-anchor="middle" font-weight="600">dog→8</text>

  <!-- Note box -->
  <rect x="14" y="146" width="492" height="24" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="260" y="162" font-size="11" fill="#166534" text-anchor="middle" font-family="system-ui, sans-serif">hash('apple') → bucket 0 → read value 5.  Same math for every key.  O(1) average.</text>
</svg>
